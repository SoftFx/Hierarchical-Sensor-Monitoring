name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          claude_args: --allowedTools "Bash(git diff*),Bash(git log*),Bash(gh pr comment*),Bash(gh pr diff*),Bash(gh pr view*),Write"
          prompt: |
            Please review pull request #${{ github.event.pull_request.number }} in this repository.
            PR title: ${{ github.event.pull_request.title }}
            Branch: ${{ github.head_ref }} -> ${{ github.base_ref }}

            Use `git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }}` to see the changes.
            Analyze the changes, identify potential bugs, security issues, performance problems, and suggest improvements.
            Post your review by:
            1. Writing the review text to a file: review_output.md
            2. Then posting it: gh pr comment ${{ github.event.pull_request.number }} --body-file review_output.md
