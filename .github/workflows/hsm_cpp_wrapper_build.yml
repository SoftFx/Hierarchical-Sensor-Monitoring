name: hsm-wrapper-build

# Builds the native HSMCppWrapper.dll (pure C++ over hsm::collector — no CLR) and runs the
# in-process ABI smoke. Replaces the former C++/CLI MSBuild lane.

on:
  push:
    branches:
      - master
      - hsm-cpp-wrapper
    paths:
      - 'src/wrapper/**'
      - 'src/native/collector/**'
      - '.github/workflows/hsm_cpp_wrapper_build.yml'
  pull_request:
    # ready_for_review is required so the build runs when a draft is marked ready
    # (marking ready does not emit a synchronize event).
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/wrapper/**'
      - 'src/native/collector/**'
      - '.github/workflows/hsm_cpp_wrapper_build.yml'

  workflow_dispatch:

jobs:
  build:
    # Skip on draft PRs only. Non-PR events (push/workflow_dispatch) have no
    # pull_request payload, so they must still run — hence the event_name guard.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install libcurl (vcpkg)
        run: vcpkg install curl:x64-windows
        shell: cmd

      - name: Configure
        run: >
          cmake -G "Visual Studio 17 2022" -A x64 -S src/wrapper -B build/wrapper
          -DCMAKE_TOOLCHAIN_FILE=%VCPKG_INSTALLATION_ROOT%/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=x64-windows
        shell: cmd

      - name: Build
        run: cmake --build build/wrapper --config Release
        shell: cmd

      - name: Smoke (drive the public ABI in-process, no server needed)
        run: |
          set "PATH=%CD%\build\wrapper\Release;%VCPKG_INSTALLATION_ROOT%\installed\x64-windows\bin;%PATH%"
          build\wrapper\Release\WrapperConsole.exe
        shell: cmd
