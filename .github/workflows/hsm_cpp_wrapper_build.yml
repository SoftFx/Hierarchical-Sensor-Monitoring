name: hsm-wrapper-build

on:
  push:
    branches:
      - hsm-cpp-wrapper
  pull_request:
    # ready_for_review is required so the build runs when a draft is marked ready
    # (marking ready does not emit a synchronize event).
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - hsm-cpp-wrapper

  workflow_dispatch:

jobs:
  build:
    # Skip on draft PRs only. Non-PR events (push/workflow_dispatch) have no
    # pull_request payload, so they must still run — hence the event_name guard.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.0.2

      - name: Install dependencies
        run: nuget.exe restore src/HSMCppWrapper/HSMCppWrapper.sln

      - name: Build
        run: msbuild src/HSMCppWrapper/HSMCppWrapper.sln /property:Configuration=Release /property:Platform=x64 /property:OutDir='${{ github.workspace }}\Release\HSMCppWrapper' 