name: Native collector conformance

# Builds the native C++ collector core and runs the shared conformance corpus
# (tests/conformance/collector/*.hsmtest) against it via ctest, on Windows and
# Linux. The same corpus runs against the .NET collector in collector-unit-tests
# (CollectorConformanceTests) — together they form the parity gate of epic #1093.
#
# Lanes (#1095 toolchain hardening):
# - format-check : clang-format (pinned) must report no diff.
# - native-conformance : MSVC + gcc, warnings-as-errors, the corpus via ctest.
# - native-conformance-clang : the same on Linux clang (toolchain matrix).
# - sanitizers : the suite under clang ASan+UBSan and TSan on Linux.

on:
  push:
    branches: [master, develop]
    paths:
      - 'src/native/**'
      - 'tests/conformance/**'
      - '.github/workflows/native-collector-conformance.yml'
  pull_request:
    # ready_for_review is required so tests run when a draft is marked ready
    # (marking ready does not emit a synchronize event).
    types: [opened, synchronize, reopened, ready_for_review]
    # No paths filter — this lane is intended as a required check and must
    # always report status. The build is two translation units; it is cheap.
  workflow_dispatch:

jobs:
  format-check:
    # clang-format is pinned to the exact version the .clang-format config was
    # authored against — minor versions disagree on formatting, so an unpinned
    # runner clang-format would flag false diffs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install clang-format
        run: pip install clang-format==19.1.1
      - name: Check formatting
        run: |
          clang-format --version
          files=$(find src/native/collector \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \))
          echo "$files"
          clang-format --dry-run --Werror $files

  native-conformance:
    # Skip on draft PRs only. Non-PR events (push/workflow_dispatch) have no
    # pull_request payload, so they must still run — hence the event_name guard.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S src/native/collector -B build/native-collector -DHSM_COLLECTOR_WERROR=ON

      - name: Build
        run: cmake --build build/native-collector --config Release --parallel

      # Runs both lanes registered in the native CMakeLists:
      # - native_* regression tests (C ABI / validation / JSON escaping)
      # - conformance_* fixtures — the shared .hsmtest corpus
      - name: Test
        run: ctest --test-dir build/native-collector -C Release --output-on-failure

  native-conformance-clang:
    # The toolchain matrix's clang leg (the default ubuntu lane above uses gcc).
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S src/native/collector -B build/native-clang -DHSM_COLLECTOR_WERROR=ON
      - name: Build
        run: cmake --build build/native-clang --parallel
      - name: Test
        run: ctest --test-dir build/native-clang --output-on-failure

  http-transport:
    # Builds the optional libcurl HTTP transport (HSM_COLLECTOR_HTTP=ON) and runs the
    # transport-only tests: the in-proc capture-server E2E, the endpoint route table, and the
    # retry policy. curl comes from vcpkg manifest mode (src/native/collector/vcpkg.json), so
    # the baseline there must stay an upstream microsoft/vcpkg commit. ssl-only feature set →
    # Schannel on Windows / OpenSSL on Linux, no heavyweight TLS build.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      VCPKG_DISABLE_METRICS: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps for vcpkg curl
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nasm

      # Pinned to the vcpkg.json builtin-baseline so the manifest resolves deterministically.
      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 6f29f12e82a8293156836ad81cc9bf5af41fe836

      - name: Configure (HTTP transport on)
        # vcpkg manifest install runs here (cmake project() triggers it). run-vcpkg defaults
        # VCPKG_BINARY_SOURCES to "clear;x-gha,readwrite", whose GHA backend needs
        # ACTIONS_RUNTIME_TOKEN / ACTIONS_CACHE_URL that aren't reliably exported — failing the
        # install. Override to "clear" for this step so curl is built from source, no cache tokens.
        env:
          VCPKG_BINARY_SOURCES: clear
        run: >
          cmake -S src/native/collector -B build/native-http
          -DHSM_COLLECTOR_WERROR=ON
          -DHSM_COLLECTOR_HTTP=ON
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build/native-http --config Release --parallel

      # Transport E2E (real libcurl against a loopback capture server), route table, retry policy.
      - name: Test (HTTP lane)
        run: ctest --test-dir build/native-http -C Release --output-on-failure -R "native_http"

  sanitizers:
    # ASan+UBSan and TSan on Linux clang. These exercise the multi-threaded
    # scheduler/worker that the single-threaded corpus run cannot stress.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        preset: [asan, tsan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
        working-directory: src/native/collector
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
        working-directory: src/native/collector
      - name: Test
        run: ctest --preset ${{ matrix.preset }}
        working-directory: src/native/collector
